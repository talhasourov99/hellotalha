<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Date Request</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

  :root{
    --pink: #d6356f;
    --pink-light: #f7d9e3;
    --bg1: #f6e0ec;
    --bg2: #e6e6fa;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; height:100%;
    font-family: Georgia, 'Times New Roman', serif;
    background: linear-gradient(135deg, var(--bg1), var(--bg2));
    overflow:hidden;
  }
  #app{
    position:relative;
    width:100%; height:100vh;
    display:flex; align-items:center; justify-content:center;
  }
  .card{
    background:#fff;
    border-radius: 22px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.12);
    padding: 40px 36px;
    width: 360px;
    max-width: 90vw;
    text-align:center;
    position:relative;
    animation: pop .35s ease;
  }
  @keyframes pop{
    from{ transform: scale(.85); opacity:0; }
    to{ transform: scale(1); opacity:1; }
  }
  h1{
    color: var(--pink);
    font-size: 26px;
    margin: 0 0 28px;
    line-height:1.35;
  }
  .btn-row{
    position: relative;
    height: 60px;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .yes-btn{
    background: var(--pink);
    color:#fff;
    border:none;
    border-radius: 30px;
    padding: 16px 0;
    width:100%;
    font-size: 18px;
    font-weight:bold;
    font-family: inherit;
    cursor:pointer;
    transition: transform .25s ease;
  }
  .yes-btn:hover{ transform: scale(1.05); }
  .no-btn{
    position:absolute;
    background:#fff;
    color:#666;
    border:1px solid #ddd;
    border-radius: 30px;
    padding: 10px 18px;
    font-size: 15px;
    font-family: inherit;
    cursor:pointer;
    transition: top .15s ease, left .15s ease, opacity .2s ease, transform .2s ease;
  }

  /* step 2: food grid */
  .food-grid{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:14px;
    margin: 8px 0 24px;
  }
  .food-option{
    border:2px solid #eee;
    border-radius: 14px;
    padding: 18px 8px;
    cursor:pointer;
    transition: border-color .2s, background .2s, transform .15s;
    user-select:none;
  }
  .food-option .emoji{ font-size: 32px; display:block; margin-bottom:6px; }
  .food-option .label{ color:#444; font-size:14px; font-family: Arial, sans-serif; }
  .food-option:hover{ transform: translateY(-2px); }
  .food-option.selected{
    border-color: var(--pink);
    background: var(--pink-light);
  }
  .next-btn{
    background: var(--pink);
    color:#fff;
    border:none;
    border-radius: 30px;
    padding: 14px 0;
    width:100%;
    font-size: 17px;
    font-weight:bold;
    font-family: inherit;
    cursor:pointer;
    opacity:0.4;
    pointer-events:none;
    transition: opacity .2s;
  }
  .next-btn.active{ opacity:1; pointer-events:auto; }
  .subtitle{ font-size:34px; margin-bottom:4px; }

  /* step 3: confirmation */
  .yay{ color: var(--pink); font-size: 30px; margin: 0 0 18px; }
  .details{
    background: var(--pink-light);
    border-radius: 14px;
    padding: 16px 18px;
    text-align:left;
    font-family: Arial, sans-serif;
    color:#444;
    margin-bottom: 20px;
  }
  .details div{ margin: 6px 0; font-size: 15px; }
  .closing{
    color: var(--pink);
    font-style: italic;
    font-size: 16px;
    margin-bottom: 18px;
  }
  .footnote{
    font-family: Arial, sans-serif;
    font-size: 11px;
    color:#999;
    font-style: italic;
  }

  /* step 3: date/time picker */
  .field{
    text-align:left;
    margin-bottom: 18px;
    font-family: Arial, sans-serif;
  }
  .field label{
    display:block;
    font-size: 13px;
    color:#888;
    margin-bottom: 6px;
  }
  .field input{
    width:100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1.5px solid #eee;
    font-size: 15px;
    font-family: Arial, sans-serif;
    color:#444;
    outline:none;
    transition: border-color .2s;
  }
  .field input:focus{ border-color: var(--pink); }

  /* confetti */
  .confetti{
    position:fixed;
    top:-10px;
    font-size: 18px;
    pointer-events:none;
    animation: fall linear forwards;
  }
  @keyframes fall{
    to{ transform: translateY(110vh) rotate(360deg); opacity: 0.9; }
  }
</style>
</head>
<body>

<div id="app"></div>

<script>
/* ====== EDIT THIS TO CUSTOMIZE ====== */
const CONFIG = {
  question: "🌸 Will you go on a date with me? 🌸",
  closingMessage: "I'm so excited to see you!🌷✨",
  footnote: "(Me,Talha, gave NO every chance to escape, because some answers just aren't allowed to exist.)",
  foods: [
    { emoji: "🍕", label: "Pizza" },
    { emoji: "🥘", label: "Biriyani"},
    { emoji: "🍔", label: "Burgers"},
    { emoji: "🍝", label: "Pasta" },
    { emoji: "🥩", label: "Beef" },
    { emoji: "🍗", label: "Fried Chicken"}
  ]
};

const app = document.getElementById('app');
let chosenFood = null;
let chosenDate = null;
let chosenTime = null;

function renderStep1(){
  app.innerHTML = `
    <div class="card">
      <h1>${CONFIG.question}</h1>
      <div class="btn-row" id="btnRow">
        <button class="yes-btn" id="yesBtn">YES 🤍</button>
        <button class="no-btn" id="noBtn" style="right:8px;">NO 😏</button>
      </div>
    </div>
  `;

  const yesBtn = document.getElementById('yesBtn');
  const noBtn = document.getElementById('noBtn');
  const btnRow = document.getElementById('btnRow');
  let dodgeCount = 0;
  const maxDodges = 8;

  function dodge(cursorX, cursorY){
    if(dodgeCount >= maxDodges){
      noBtn.style.opacity = '0';
      noBtn.style.pointerEvents = 'none';
      return;
    }
    dodgeCount++;
    const rowRect = btnRow.getBoundingClientRect();
    const btnW = noBtn.offsetWidth;
    const btnH = noBtn.offsetHeight;
    const maxX = Math.max(rowRect.width - btnW, 10);
    const maxY = 200;

    // Try a few candidate spots, pick the one farthest from the cursor.
    let bestX = 0, bestY = 0, bestDist = -1;
    for(let i=0; i<6; i++){
      const candX = Math.random() * maxX;
      const candY = (Math.random() - 0.5) * maxY;
      const absX = rowRect.left + candX;
      const absY = rowRect.top + rowRect.height/2 + candY;
      const dist = (cursorX != null) ? Math.hypot(absX - cursorX, absY - cursorY) : 0;
      if(dist > bestDist){ bestDist = dist; bestX = candX; bestY = candY; }
    }

    noBtn.style.left = bestX + 'px';
    noBtn.style.right = 'auto';
    noBtn.style.top = (btnRow.offsetHeight/2 - btnH/2 + bestY) + 'px';

    const scale = Math.max(1 - dodgeCount * 0.1, 0.35);
    const opacity = Math.max(1 - dodgeCount * 0.1, 0.15);
    noBtn.style.transform = `scale(${scale})`;
    noBtn.style.opacity = opacity;

    if(dodgeCount >= maxDodges){
      noBtn.style.pointerEvents = 'none';
    }
  }

  // Proactively dodge based on cursor proximity, not just hover/click,
  // so fast mouse movements can't "catch" the button before a hover event fires.
  const dodgeRadius = 90;
  function onMouseMove(e){
    if(dodgeCount >= maxDodges) return;
    const rect = noBtn.getBoundingClientRect();
    const cx = rect.left + rect.width/2;
    const cy = rect.top + rect.height/2;
    const dist = Math.hypot(e.clientX - cx, e.clientY - cy);
    if(dist < dodgeRadius) dodge(e.clientX, e.clientY);
  }
  document.addEventListener('mousemove', onMouseMove);
  noBtn.addEventListener('mouseenter', (e) => dodge(e.clientX, e.clientY));
  noBtn.addEventListener('touchstart', (e) => { e.preventDefault(); dodge(); });
  noBtn.addEventListener('click', (e) => { e.preventDefault(); dodge(); });

  yesBtn.addEventListener('click', () => {
    document.removeEventListener('mousemove', onMouseMove);
    renderStep2();
  });
}

function renderStep2(){
  app.innerHTML = `
    <div class="card">
      <div class="subtitle">🍽️✨</div>
      <h1>What are we feeling?</h1>
      <div class="food-grid" id="foodGrid"></div>
      <button class="next-btn" id="nextBtn">Next 💕</button>
    </div>
  `;

  const grid = document.getElementById('foodGrid');
  CONFIG.foods.forEach(food => {
    const el = document.createElement('div');
    el.className = 'food-option';
    el.innerHTML = `<span class="emoji">${food.emoji}</span><span class="label">${food.label}</span>`;
    el.addEventListener('click', () => {
      document.querySelectorAll('.food-option').forEach(o => o.classList.remove('selected'));
      el.classList.add('selected');
      chosenFood = food.label;
      document.getElementById('nextBtn').classList.add('active');
    });
    grid.appendChild(el);
  });

  document.getElementById('nextBtn').addEventListener('click', () => {
    if(chosenFood) renderStep3();
  });
}

function renderStep3(){
  app.innerHTML = `
    <div class="card">
      <div class="subtitle">📅💖</div>
      <h1>When works for you?</h1>
      <div class="field">
        <label for="dateInput">Pick a date</label>
        <input type="date" id="dateInput">
      </div>
      <div class="field">
        <label for="timeInput">Pick a time</label>
        <input type="time" id="timeInput">
      </div>
      <button class="next-btn" id="nextBtn">Confirm 💕</button>
    </div>
  `;

  const dateInput = document.getElementById('dateInput');
  const timeInput = document.getElementById('timeInput');
  const nextBtn = document.getElementById('nextBtn');

  function checkReady(){
    if(dateInput.value && timeInput.value) nextBtn.classList.add('active');
    else nextBtn.classList.remove('active');
  }
  dateInput.addEventListener('change', checkReady);
  timeInput.addEventListener('change', checkReady);

  nextBtn.addEventListener('click', () => {
    if(!dateInput.value || !timeInput.value) return;
    const dateObj = new Date(dateInput.value + 'T00:00:00');
    chosenDate = dateObj.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
    const [h, m] = timeInput.value.split(':').map(Number);
    const ampm = h >= 12 ? 'PM' : 'AM';
    const h12 = h % 12 === 0 ? 12 : h % 12;
    chosenTime = `${h12}:${String(m).padStart(2,'0')} ${ampm}`;
    renderStep4();
  });
}

function renderStep4(){
  app.innerHTML = `
    <div class="card" id="photoCard">
      <div class="yay">YAY!! 💕</div>
      <div class="details">
        <div>📅 ${chosenDate}</div>
        <div>⏰ ${chosenTime}</div>
        <div>🍽️ ${chosenFood}</div>
      </div>
      <div class="closing">${CONFIG.closingMessage}</div>
      <div class="footnote">${CONFIG.footnote}</div>
    </div>
  `;
  launchConfetti();
}

function launchConfetti(){
  const emojis = ['🌸','💕','✨','🌷'];
  for(let i=0; i<40; i++){
    setTimeout(() => {
      const c = document.createElement('div');
      c.className = 'confetti';
      c.textContent = emojis[Math.floor(Math.random()*emojis.length)];
      c.style.left = Math.random()*100 + 'vw';
      c.style.animationDuration = (2.5 + Math.random()*2) + 's';
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 5000);
    }, i*60);
  }
}

renderStep1();
</script>
</body>
</html>
